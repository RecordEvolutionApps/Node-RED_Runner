name: Node-RED_Runner
widgets:

  - layout_id: 823116a1-d080-42de-be05-891b23a3df12
    package_name: widget-embed
    version: 1.0.8
    chartconfig:
      webUrl:
        valueRef:
          queryParams:
            limit: 1
            filterAnd:
              - operator: =
                value: "1"
                dataType: string
                useRoute: true
                column: devname
              - value: "true"
                dataType: boolean
                column: latest_flag
                operator: =
          tablename: devices
          column: url
      title: null
      multiEmbed: $bool:false
    custom_style: null
  - layout_id: ac56891b-5f5e-46bc-9692-eae85e6f569a
    package_name: widget-navbutton
    version: 1.0.5
    chartconfig:
      iconName: $str:home
      route: $str:/
      style:
        fontSize: $num:16
      leadingSlash: null
      trailingSlash: null
      title: $str:Home
  - layout_id: b14fb7d0-d62a-4921-9fa7-1b452469af1c
    package_name: widget-navbar
    version: 1.0.14
    chartconfig:
      route: $str:/
      leadingSlash: null
      trailingSlash: null
      variables: []
      title: $str:All
      style:
        fontWeight: $num:400
        fontSize: $num:16
      navItems:
        tableRef:
          tablename: devices
          queryParams:
            nowMinusPeriods: 0
            limit: 100
            filterAnd:
              - operator: =
                value: "true"
                dataType: boolean
                column: latest_flag
            windowPeriod: null
            windowLength: 5
          format:
            label: devname
            variables: []
            iconName: $str:hard_drive
            route: devname
            leadingSlash: null
            trailingSlash: null
    custom_style: null
  - layout_id: ef02ba85-1be6-47c7-8bcc-f9c66997d550
    package_name: widget-embed
    version: 1.0.8
    chartconfig:
      gap: $num:4
      data:
        tableRef:
          queryParams:
            limit: 500
            filterAnd:
              - column: latest_flag
                operator: =
                value: "true"
                dataType: boolean
          format:
            title: devname
            url: url
          tablename: devices
      title: null
      multiEmbed: $bool:true
    custom_style: null
  - layout_id: ff38a260-f2ef-4016-9d51-19451f68e9e2
    package_name: widget-textbox
    version: 1.1.8
    chartconfig:
      body:
        text: "$str:"
        color: ""
        backgroundColor: ""
      title:
        text: $str:Pick a Node-RED server above
        color: ""
        backgroundColor: ""
      subTitle:
        color: ""
        text: "$str:"
layout:
  gridLayout:
    - w: 96
      h: 5
      z: 1000
      fixedHeight: true
      id: b14fb7d0-d62a-4921-9fa7-1b452469af1c
      x: 0
      y: 0
    - id: ef02ba85-1be6-47c7-8bcc-f9c66997d550
      z: 1001
      x: 0
      y: 5
      w: 96
      h: 59
  subRoutes:
    "*":
      gridLayout:
        - x: 0
          y: 0
          w: 5
          h: 3
          id: ac56891b-5f5e-46bc-9692-eae85e6f569a
          z: 1000
        - z: 1001
          y: 5
          w: 96
          h: 59
          id: 823116a1-d080-42de-be05-891b23a3df12
          x: 0
        - w: 96
          h: 5
          id: b14fb7d0-d62a-4921-9fa7-1b452469af1c
          x: 0
          z: 1002
          fixedHeight: true
          y: 0
      groups: []
  groups: []
style:
  theme:
    theme_name: essos
  background_color: "#fdfcf5"
  text_color: "#893448"
  tile_background_color: "#fdfcf5"
  tile_border_color: "#e6e6e600"
